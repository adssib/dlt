name: CI

on:
  push:
    branches: [main]
  pull_request:

# `build` is the gate. vet / test / lint each `needs: build`, so:
#   - build fails  -> ONE red at the top; the rest are skipped (no compile-error noise).
#   - build passes -> vet, test, lint all fan out in PARALLEL and fail independently.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...

  vet:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  # -race is what will catch the rng data race under concurrent load.
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  # Advisory: findings show up but don't fail CI while you're learning.
  # Flip continue-on-error to false when you want it to gate merges.
  lint:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # TODO(you): add these jobs as each phase lands — nothing to lint until then.
  #   Phase 6 (Docker):     hadolint on Dockerfile
  #   Phase 7 (Kubernetes): kubeconform (schema) + kube-linter (best practices);
  #                         `kustomize build | kubeconform` for overlays
  #   later  (Helm):        `helm lint` + `helm template | kubeconform`
